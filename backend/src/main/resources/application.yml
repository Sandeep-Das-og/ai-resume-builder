server:
  port: 8080

spring:
  jackson:
    serialization:
      INDENT_OUTPUT: true

app:
  templates:
    path: classpath:templates
  ats:
    maxFileSizeBytes: 2097152
    maxParsedChars: 50000
    allowedContentTypes:
      - application/pdf
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - text/plain
  export:
    maxContentChars: 40000
  email:
    apiKey: ${BREVO_API_KEY:}
    senderEmail: ${BREVO_SENDER_EMAIL:noreply@example.com}
    senderName: ${BREVO_SENDER_NAME:AI Resume Builder}
    maxContentChars: 20000
  security:
    rateLimitPerMinute: 5
